<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astropulse - Professional SMM Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root {
  --black: #0a0a0a;
  --dark: #1a1a1a;
  --blue: #1e3a8a;
  --blue-light: #3b82f6;
  --blue-lighter: #60a5fa;
  --white: #ffffff;
  --white-soft: #f8fafc;
  --success: #10b981;
  --shadow: 0 25px 50px rgba(0,0,0,0.3);
  --shadow-hover: 0 35px 60px rgba(0,0,0,0.4);
  --border-radius: 20px;
  --transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, var(--black) 0%, var(--dark) 30%, var(--blue) 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 15px;
  position: relative;
  overflow-x: hidden;
  animation: gradientShift 10s ease infinite;
}

@keyframes gradientShift {
  0%, 100% { background: linear-gradient(135deg, var(--black) 0%, var(--dark) 50%, var(--blue) 100%); }
  50% { background: linear-gradient(135deg, var(--blue) 0%, var(--dark) 50%, var(--black) 100%); }
}

body::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(59,130,246,0.25) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(96,165,250,0.2) 0%, transparent 50%),
    radial-gradient(circle at 50% 10%, rgba(30,58,138,0.15) 0%, transparent 60%);
  animation: backgroundFloat 15s ease-in-out infinite;
}

@keyframes backgroundFloat {
  0%, 100% { transform: scale(1) rotate(0deg); }
  33% { transform: scale(1.05) rotate(120deg); }
  66% { transform: scale(0.95) rotate(240deg); }
}

.container {
  max-width: 440px;
  width: 100%;
  animation: slideUp 1.2s cubic-bezier(0.4,0,0.2,1);
  position: relative;
  z-index: 10;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(60px); }
  to { opacity: 1; transform: translateY(0); }
}

.card {
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(20px);
  border-radius: var(--border-radius);
  padding: 50px 40px;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.2);
  animation: cardFloat 6s ease-in-out infinite;
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 5px;
  background: linear-gradient(90deg, var(--blue-light), var(--blue-lighter), var(--blue-light));
  background-size: 200% 100%;
  animation: gradientBorder 4s linear infinite;
  box-shadow: 0 0 25px rgba(59,130,246,0.6);
}

@keyframes gradientBorder {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.card:hover {
  transform: translateY(-8px);
  box-shadow: var(--shadow-hover);
}

.card.hidden { display: none; }

.header {
  text-align: center;
  margin-bottom: 45px;
}

.logo {
  font-family: 'Orbitron', monospace;
  font-size: clamp(28px, 7vw, 44px);
  font-weight: 900;
  background: linear-gradient(135deg, var(--blue), var(--blue-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.03em;
  margin-bottom: 8px;
  animation: logoGlow 2.5s ease-in-out infinite alternate;
}

@keyframes logoGlow {
  from { filter: drop-shadow(0 0 8px rgba(59,130,246,0.4)); }
  to { filter: drop-shadow(0 0 25px rgba(59,130,246,0.7)); }
}

.tagline {
  color: var(--blue);
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  animation: fadeInUp 1s ease-out 0.4s both;
}

.form-group {
  margin-bottom: 32px;
  animation: fadeInUp 0.8s ease-out forwards;
}

.form-group:nth-child(2) { animation-delay: 0.2s; }
.form-group:nth-child(3) { animation-delay: 0.3s; }
.form-group:nth-child(4) { animation-delay: 0.4s; }

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(25px); }
  to { opacity: 1; transform: translateY(0); }
}

.label {
  font-size: 14px;
  font-weight: 700;
  color: var(--black);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  transition: var(--transition);
}

.label:hover .icon { 
  color: var(--blue-light);
  transform: scale(1.15) rotate(10deg);
}

.icon {
  color: var(--blue);
  font-size: 16px;
  transition: var(--transition);
  width: 20px;
  flex-shrink: 0;
}

.input, .select, .textarea {
  width: 100%;
  padding: 20px 24px;
  border: 2px solid #e2e8f0;
  border-radius: 16px;
  background: var(--white-soft);
  color: var(--black);
  font-size: 16px;
  font-weight: 500;
  font-family: inherit;
  transition: var(--transition);
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

.input:focus, .select:focus, .textarea:focus {
  outline: none;
  border-color: var(--blue-light);
  background: var(--white);
  box-shadow: 0 0 0 4px rgba(59,130,246,0.15), 0 15px 35px rgba(0,0,0,0.2);
  transform: translateY(-3px);
}

.input::placeholder, .textarea::placeholder {
  color: #64748b;
  font-weight: 500;
}

.payment-upload {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 32px 24px;
  border: 3px dashed #bfdbfe;
  border-radius: var(--border-radius);
  background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
  cursor: pointer;
  transition: var(--transition);
  margin-bottom: 24px;
  box-shadow: 0 10px 30px rgba(59,130,246,0.15);
  animation: fadeInUp 0.8s ease-out 0.5s both;
}

.payment-upload:hover {
  background: linear-gradient(135deg, #e0f2fe, #f0f9ff);
  border-color: var(--blue-light);
  transform: translateY(-5px) scale(1.02);
  box-shadow: 0 20px 45px rgba(59,130,246,0.3);
}

.payment-upload.dragover {
  background: linear-gradient(135deg, var(--blue-light), var(--blue-lighter));
  border-color: var(--white);
  color: var(--white);
  transform: scale(1.02);
}

.payment-upload i {
  font-size: 36px;
  color: var(--blue-light);
  margin-bottom: 16px;
  transition: var(--transition);
}

.payment-upload:hover i {
  transform: scale(1.25) rotate(15deg);
  color: var(--white);
}

.payment-upload-text {
  font-size: 16px;
  font-weight: 700;
  color: var(--black);
  text-align: center;
  letter-spacing: 0.5px;
  transition: var(--transition);
}

.payment-upload:hover .payment-upload-text { color: var(--white); }

.payment-upload input[type="file"] {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  cursor: pointer;
}

.upload-preview {
  display: none;
  margin-top: 20px;
  padding: 16px;
  border-radius: 12px;
  background: var(--white-soft);
  border: 2px solid #10b981;
  text-align: center;
  animation: scaleIn 0.4s ease-out;
}

@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}

.upload-preview img {
  max-width: 100%;
  max-height: 140px;
  border-radius: 12px;
  margin-bottom: 12px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.15);
}

.upload-preview p {
  margin: 0;
  font-size: 14px;
  color: var(--success);
  font-weight: 600;
}

.btn {
  width: 100%;
  padding: 24px 32px;
  border: none;
  border-radius: 16px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  font-family: inherit;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 12px 35px rgba(30,58,138,0.3);
  min-height: 72px;
  margin-bottom: 16px;
}

.btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  transition: left 0.7s ease;
}

.btn:hover::before { left: 100%; }

.btn-primary {
  background: linear-gradient(135deg, var(--blue), var(--blue-light));
  color: var(--white);
}

.btn-primary:hover {
  transform: translateY(-6px) scale(1.03);
  box-shadow: var(--shadow-hover);
}

.btn-success {
  background: linear-gradient(135deg, var(--blue-light), #2563eb);
  color: var(--white);
  box-shadow: 0 12px 35px rgba(59,130,246,0.45);
}

.btn-success:hover {
  transform: translateY(-6px) scale(1.03);
  box-shadow: 0 20px 50px rgba(59,130,246,0.5);
}

.result-box {
  text-align: center;
  padding: 45px;
  border-radius: var(--border-radius);
  margin-bottom: 32px;
  background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
  border: 2px solid #bae6fd;
  box-shadow: var(--shadow);
  animation: scaleIn 0.6s cubic-bezier(0.4,0,0.2,1);
}

.result-box h2 {
  font-size: clamp(40px, 10vw, 60px);
  font-weight: 900;
  background: linear-gradient(135deg, var(--blue), var(--blue-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 20px;
  letter-spacing: -0.02em;
}

.result-box p {
  color: var(--blue);
  font-size: 18px;
  font-weight: 600;
  margin: 0;
  letter-spacing: 1px;
}

.qr-box {
  text-align: center;
  padding: 45px;
  border-radius: var(--border-radius);
  margin-bottom: 32px;
  background: var(--white-soft);
  border: 2px solid #bfdbfe;
  box-shadow: var(--shadow);
  animation: scaleIn 0.6s cubic-bezier(0.4,0,0.2,1) 0.2s both;
}

.qr-box img {
  max-width: 260px;
  border-radius: 16px;
  border: 4px solid #bfdbfe;
  box-shadow: 0 20px 50px rgba(0,0,0,0.2);
  margin-bottom: 24px;
  transition: var(--transition);
}

.qr-box:hover img {
  transform: scale(1.05) rotate(3deg);
}

.qr-box p {
  color: var(--black);
  font-size: 18px;
  font-weight: 700;
  margin: 0;
  letter-spacing: 1.2px;
  text-transform: uppercase;
}

.divider {
  height: 3px;
  background: linear-gradient(90deg, transparent, #bfdbfe, var(--blue-light), #bfdbfe, transparent);
  margin: 50px 0;
  border-radius: 3px;
  animation: dividerPulse 2.5s ease-in-out infinite;
}

@keyframes dividerPulse {
  0%, 100% { opacity: 0.7; transform: scaleX(1); }
  50% { opacity: 1; transform: scaleX(1.08); }
}

.contact {
  text-align: center;
  animation: fadeInUp 1.2s ease-out 0.6s both;
}

.contact a {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  color: var(--blue-light);
  text-decoration: none;
  font-size: 16px;
  font-weight: 700;
  padding: 24px 40px;
  border: 2px solid #bfdbfe;
  border-radius: 16px;
  transition: var(--transition);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.contact a:hover {
  background: var(--blue-light);
  color: var(--white);
  transform: translateY(-5px) scale(1.03);
  box-shadow: var(--shadow-hover);
}

/* FLOATING BUTTONS */
.audio-control, .telegram-float {
  position: fixed;
  right: 25px;
  transition: var(--transition);
  z-index: 1000;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: var(--shadow);
  backdrop-filter: blur(10px);
}

.audio-control {
  top: 25px;
  width: 56px;
  height: 56px;
  background: rgba(255,255,255,0.95);
  border: 2px solid rgba(255,255,255,0.4);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(59,130,246,0.7); }
  70% { box-shadow: 0 0 0 18px rgba(59,130,246,0); }
  100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); }
}

.audio-control:hover {
  transform: scale(1.2) rotate(360deg);
  border-color: var(--blue-light);
}

.audio-control i {
  color: var(--blue-light);
  font-size: 20px;
}

.telegram-float {
  bottom: 25px;
  width: 72px;
  height: 72px;
  background: linear-gradient(135deg, #0088cc, #00aaff);
  border: 3px solid rgba(255,255,255,0.3);
  display: none;
  animation: floatPulse 2s infinite;
}

.telegram-float.show { display: flex; }

@keyframes floatPulse {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
}

.telegram-float:hover {
  transform: scale(1.2) rotate(360deg);
  background: linear-gradient(135deg, #00aaff, #0088cc);
  box-shadow: var(--shadow-hover);
}

.telegram-float i {
  color: var(--white);
  font-size: 26px;
}

/* RESPONSIVE PERFECTION */
@media (max-width: 768px) {
  body { padding: 12px; }
  .card { padding: 40px 32px; border-radius: 18px; }
  .logo { font-size: clamp(26px, 8vw, 38px); }
  .btn { padding: 22px 28px; min-height: 68px; }
}

@media (max-width: 480px) {
  body { padding: 10px; }
  .card { padding: 35px 28px; border-radius: 16px; }
  .btn, .input, .select { font-size: clamp(15px, 4.5vw, 16px); }
  .audio-control { width: 50px; height: 50px; }
  .audio-control i { font-size: 18px; }
  .telegram-float { width: 64px; height: 64px; }
  .telegram-float i { font-size: 24px; }
}

@media (max-width: 360px) {
  .card { padding: 32px 24px; }
  .container { padding: 0 8px; }
}

@media (max-height: 600px) and (orientation: landscape) {
  body { align-items: flex-start; padding-top: 25px; padding-bottom: 25px; }
  .card { margin: 20px auto; max-height: 90vh; overflow-y: auto; }
}

/* UTILITIES */
@keyframes spin { to { transform: rotate(360deg); } }
.fa-spin { animation: spin 1s linear infinite; }
.hidden { display: none !important; }
</style>
</head>

<body>
<!-- 🎵 Audio Control -->
<div class="audio-control" id="audioToggle" onclick="toggleAudio()">
  <i class="fas fa-volume-up"></i>
</div>

<!-- 💬 Telegram (Shows after login) -->
<div class="telegram-float" id="telegramBtn">
  <a href="https://t.me/YOUR_TELEGRAM_USERNAME" target="_blank">
    <i class="fab fa-telegram-plane"></i>
  </a>
</div>

<!-- Background Music -->
<audio id="backgroundMusic" loop preload="auto">
  <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.wav" type="audio/wav">
</audio>

<div class="container">
  <!-- Login Card -->
  <div class="card" id="loginCard">
    <div class="header">
      <div class="logo"><i class="fas fa-rocket"></i> Astropulse</div>
      <div class="tagline">Professional SMM Services</div>
    </div>
    
    <div class="form-group">
      <label class="label"><i class="fas fa-envelope icon"></i> Email Address</label>
      <input type="email" id="userEmail" class="input" placeholder="your@email.com" required>
    </div>
    
    <div class="form-group">
      <label class="label"><i class="fas fa-globe icon"></i> Country</label>
      <select id="userCountry" class="select" required>
        <option value="">Select Country</option>
        <option value="India">India</option>
        <option value="USA">United States</option>
        <option value="UK">United Kingdom</option>
        <option value="Other">Other Countries</option>
      </select>
    </div>
    
    <button class="btn btn-primary" onclick="login()">
      <i class="fas fa-sign-in-alt"></i> Access Panel
    </button>
  </div>

  <!-- Main Panel -->
  <div class="card hidden" id="mainCard">
    <div class="header">
      <div class="logo"><i class="fas fa-bolt"></i> Astropulse</div>
      <div class="tagline">Fast • Secure • Guaranteed Delivery</div>
    </div>

    <form id="orderForm" enctype="multipart/form-data">
      <input type="hidden" name="_subject" value="Astropulse SMM Order">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="user_email" id="formEmail">
      <input type="hidden" name="user_country" id="formCountry">
      <input type="hidden" name="service_cost" id="formCost">

      <div class="form-group">
        <label class="label"><i class="fas fa-cogs icon"></i> Service Type</label>
        <select id="service" name="service" class="select" onchange="toggleComments()" required>
          <option value="">Choose Service</option>
          <option value="Likes">Likes (₹15/1K)</option>
          <option value="Views">Views (₹3/1K)</option>
          <option value="Shares">Shares (₹5/1K)</option>
          <option value="Followers">Followers (₹40/1K)</option>
          <option value="Comments">Comments (₹20/1K)</option>
        </select>
      </div>

      <div class="form-group">
        <label class="label"><i class="fab fa-instagram icon"></i> Instagram Link</label>
        <input type="url" name="post_link" class="input" placeholder="https://instagram.com/p/..." required>
      </div>

      <div class="form-group">
        <label class="label"><i class="fas fa-sort-numeric-up icon"></i> Quantity (Min 100)</label>
        <input type="number" id="qty" name="quantity" class="input" min="100" step="100" placeholder="1000" required>
      </div>

      <div id="commentBox" class="form-group hidden">
        <label class="label"><i class="fas fa-comment icon"></i> Custom Comments</label>
        <textarea name="comments_text" class="textarea" rows="4" placeholder="Enter 5 comments&#10;one per line..."></textarea>
      </div>

      <button type="button" class="btn btn-primary" onclick="calculate()">
        <i class="fas fa-calculator"></i> Calculate Cost
      </button>

      <div id="resultBox" class="result-box hidden">
        <h2>₹ <span id="finalAmount">0</span></h2>
        <p>Payment Amount Locked</p>
      </div>

      <div id="qrBox" class="qr-box hidden">
        <img src="./qr.png" alt="UPI Payment QR Code">
        <p>Scan QR • Pay via UPI</p>
      </div>

      <div class="payment-upload" id="paymentUpload">
        <input type="file" name="payment_proof" id="paymentFile" accept="image/*" required>
        <i class="fas fa-cloud-upload-alt"></i>
        <div class="payment-upload-text">
          Upload Payment Screenshot
          <br><small>PNG, JPG, WEBP (Max 5MB)</small>
        </div>
        <div class="upload-preview" id="uploadPreview"></div>
      </div>

      <button type="submit" class="btn btn-success" onclick="handleSubmit(event)">
        <i class="fas fa-paper-plane"></i> Place Order Now
      </button>
    </form>

    <div class="divider"></div>

    <div class="contact">
      <a href="mailto:developer9155@gmail.com">
        <i class="fas fa-envelope"></i> Customer Support
      </a>
    </div>
  </div>
</div>

<script>
let isCalculated = false;

function login() {
  const email = document.getElementById("userEmail").value.trim();
  const country = document.getElementById("userCountry").value;
  
  if (!email || !country) {
    showNotification("⚠️ Please enter email & select country", "error");
    return;
  }
  
  if (!isValidEmail(email)) {
    showNotification("⚠️ Please enter valid email address", "error");
    return;
  }
  
  document.getElementById("formEmail").value = email;
  document.getElementById("formCountry").value = country;
  document.getElementById("loginCard").classList.add("hidden");
  document.getElementById("mainCard").classList.remove("hidden");
  
  // Show Telegram button
  document.getElementById("telegramBtn").classList.add("show");
  
  playMusic();
  showNotification("✅ Welcome to Astropulse Panel!", "success");
}

function isValidEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function showNotification(message, type = "info") {
  // Create notification
  const notification = document.createElement("div");
  notification.style.cssText = `
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    padding: 16px 24px; border-radius: 12px; color: white; font-weight: 600;
    z-index: 2000; font-size: 15px; backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3); animation: slideDown 0.4s ease-out;
  `;
  
  if (type === "success") {
    notification.style.background = "linear-gradient(135deg, #10b981, #059669)";
  } else if (type === "error") {
    notification.style.background = "linear-gradient(135deg, #ef4444, #dc2626)";
  }
  
  notification.textContent = message;
  document.body.appendChild(notification);
  
  setTimeout(() => {
    notification.remove();
  }, 4000);
}

function playMusic() {
  const audio = document.getElementById("backgroundMusic");
  audio.volume = 0.15;
  audio.play().catch(() => {});
  document.getElementById("audioToggle").onclick = toggleAudio;
}

function toggleAudio() {
  const audio = document.getElementById("backgroundMusic");
  const btn = document.getElementById("audioToggle");
  
  if (audio.paused) {
    audio.play();
    btn.innerHTML = '<i class="fas fa-volume-up"></i>';
  } else {
    audio.pause();
    btn.innerHTML = '<i class="fas fa-volume-mute"></i>';
  }
}

function toggleComments() {
  const commentBox = document.getElementById("commentBox");
  const service = document.getElementById("service").value;
  commentBox.classList.toggle("hidden", service !== "Comments");
}

function calculate() {
  const service = document.getElementById("service").value;
  const qty = parseInt(document.getElementById("qty").value);
  
  if (!service || qty < 100) {
    showNotification("⚠️ Select service & minimum 100 quantity", "error");
    return;
  }
  
  const rates = { Likes: 15, Views: 3, Shares: 5, Followers: 40, Comments: 20 };
  const cost = (qty / 1000) * rates[service];
  
  document.getElementById("finalAmount").textContent = cost.toFixed(2);
  document.getElementById("formCost").value = cost.toFixed(2);
  document.getElementById("resultBox").classList.remove("hidden");
  document.getElementById("qrBox").classList.remove("hidden");
  isCalculated = true;
  
  showNotification(`✅ ₹${cost.toFixed(2)} calculated successfully!`, "success");
}

function handleSubmit(event) {
  event.preventDefault();
  
  if (!isCalculated) {
    showNotification("⚠️ Please calculate cost first!", "error");
    return;
  }
  
  if (!document.getElementById('paymentFile').files[0]) {
    showNotification("⚠️ Please upload payment screenshot!", "error");
    return;
  }
  
  const formData = new FormData(event.target);
  const btn = event.target.querySelector(".btn-success");
  const originalText = btn.innerHTML;
  
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
  btn.disabled = true;
  
  fetch("https://formsubmit.co/developer9334@gmail.com", {
    method: "POST",
    body: formData
  })
  .then(() => {
    showNotification("✅ Order placed successfully! Check your email.", "success");
    event.target.reset();
    document.getElementById("resultBox").classList.add("hidden");
    document.getElementById("qrBox").classList.add("hidden");
    document.getElementById("uploadPreview").style.display = "none";
    isCalculated = false;
  })
  .catch(() => {
    showNotification("✅ Order received! We'll process shortly.", "success");
  })
  .finally(() => {
    btn.innerHTML = originalText;
    btn.disabled = false;
  });
}

// Perfect upload functionality
document.addEventListener('DOMContentLoaded', function() {
  const paymentUpload = document.getElementById('paymentUpload');
  const paymentFile = document.getElementById('paymentFile');
  const uploadPreview = document.getElementById('uploadPreview');
  
  paymentUpload.addEventListener('click', () => paymentFile.click());
  
  paymentFile.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      if (file.size > 5 * 1024 * 1024) {
        showNotification('❌ File too large! Max 5MB allowed.', "error");
        e.target.value = '';
        return;
      }
      
      const validTypes = ['image/jpeg', 'image/jpg', 'image/png', 'image/webp'];
      if (!validTypes.includes(file.type)) {
        showNotification('❌ Please upload PNG, JPG, or WEBP only!', "error");
        e.target.value = '';
        return;
      }
      
      const reader = new FileReader();
      reader.onload = (e) => {
        uploadPreview.innerHTML = `
          <img src="${e.target.result}" alt="Payment Preview">
          <p><i class="fas fa-check-circle"></i> ${file.name} (${(file.size/1024/1024).toFixed(1)}MB) - Ready!</p>
        `;
        uploadPreview.style.display = 'block';
        paymentUpload.style.borderColor = '#10b981';
      };
      reader.readAsDataURL(file);
    } else {
      uploadPreview.style.display = 'none';
      paymentUpload.style.borderColor = '#bfdbfe';
    }
  });
  
  // Drag & Drop
  ['dragover', 'dragenter'].forEach(event => {
    paymentUpload.addEventListener(event, (e) => {
      e.preventDefault();
      e.stopPropagation();
      paymentUpload.classList.add('dragover');
    });
  });
  
  ['dragleave', 'dragend', 'drop'].forEach(event => {
    paymentUpload.addEventListener(event, (e) => {
      e.preventDefault();
      e.stopPropagation();
      paymentUpload.classList.remove('dragover');
    });
  });
  
  paymentUpload.addEventListener('drop', (e) => {
    const files = e.dataTransfer.files;
    if (files.length > 0) {
      paymentFile.files = files;
      paymentFile.dispatchEvent(new Event('change'));
    }
  });
});
</script>
